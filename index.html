<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地名語音調查系統</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; max-width: 500px; margin: 0 auto; }
        h1 { text-align: center; color: #2c3e50; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; color: white; margin-bottom: 10px; transition: background 0.3s; }
        .btn-primary { background-color: #3498db; }
        .btn-primary:hover { background-color: #2980b9; }
        .btn-record { background-color: #e74c3c; }
        .btn-stop { background-color: #95a5a6; display: none; }
        .btn-upload { background-color: #2ecc71; display: none; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; color: #d35400; }
        #audio-playback { width: 100%; margin-top: 15px; display: none; }
        #app-section { display: none; } /* 初始隱藏工作區 */
        .user-info { background-color: #e8f8f5; padding: 10px; border-radius: 5px; margin-bottom: 15px; text-align: center; color: #16a085; font-weight: bold; }
    </style>
</head>
<body>

    <h1>地名語音調查系統</h1>

    <div id="login-section" class="card">
        <h2>調查員登入</h2>
        <label>帳號：</label>
        <input type="text" id="account" placeholder="請輸入帳號">
        <label>密碼：</label>
        <input type="password" id="password" placeholder="請輸入密碼">
        <button class="btn-primary" onclick="login()" id="login-btn">登入系統</button>
        <div id="login-status" style="text-align: center; margin-top: 10px; color: red;"></div>
    </div>

    <div id="app-section">
        <div class="user-info" id="user-greeting"></div>

        <div class="card">
            <label for="place-select">請選擇要錄音的地名：</label>
            <select id="place-select">
                <option value="">載入中...</option>
            </select>
        </div>

        <div class="card" id="record-card">
            <button class="btn-record" id="start-btn" onclick="startRecording()">🎤 開始錄音</button>
            <button class="btn-stop" id="stop-btn" onclick="stopRecording()">⏹️ 停止錄音</button>
            <audio id="audio-playback" controls></audio>
            <button class="btn-upload" id="upload-btn" onclick="uploadAudio()">⬆️ 上傳至雲端資料庫</button>
            <div id="status"></div>
        </div>
    </div>

    <script>
        // ⚠️ 請替換成你最新部署的 Google Apps Script 網址
        const API_URL = "https://script.google.com/macros/s/AKfycbyxPScSi3MxyJUT93vD0-fRx6dT3As7qWkCl_R6VD2BFmgxP4eqQVJKdYvir66CyHBUnw/exec"; 
        
        let mediaRecorder;
        let audioChunks = [];
        let audioBlob = null;
        let currentUserId = ""; // 紀錄目前登入的調查員 ID

        // ================= 1. 登入與取得清單 =================
        async function login() {
            const acc = document.getElementById('account').value;
            const pwd = document.getElementById('password').value;
            const loginBtn = document.getElementById('login-btn');
            const loginStatus = document.getElementById('login-status');

            if (!acc || !pwd) {
                loginStatus.innerText = "請輸入帳號與密碼！";
                return;
            }

            loginBtn.innerText = "驗證中，請稍候...";
            loginBtn.disabled = true;
            loginStatus.innerText = "";

            try {
                // 發送登入請求 (夾帶 action: 'login')
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // 使用 text/plain 避免 CORS preflight 問題
                    body: JSON.stringify({ action: 'login', account: acc, password: pwd })
                });

                const result = await response.json();

                if (result.success) {
                    // 登入成功：紀錄 UserID、切換畫面
                    currentUserId = result.userId;
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('app-section').style.display = 'block';
                    document.getElementById('user-greeting').innerText = `歡迎！調查員代號：${currentUserId} (共分配 ${result.places.length} 筆地名)`;
                    
                    // 渲染專屬下拉選單
                    populateDropdown(result.places);
                } else {
                    loginStatus.innerText = "❌ 登入失敗：" + result.error;
                    loginBtn.innerText = "登入系統";
                    loginBtn.disabled = false;
                }
            } catch (error) {
                loginStatus.innerText = "❌ 連線錯誤，請檢查網路狀態。";
                loginBtn.innerText = "登入系統";
                loginBtn.disabled = false;
            }
        }

        function populateDropdown(places) {
            const select = document.getElementById('place-select');
            select.innerHTML = '<option value="">-- 請選擇地名 --</option>'; // 清空並加入預設選項
            
            if (places.length === 0) {
                select.innerHTML = '<option value="">(您目前沒有被分配任何地名)</option>';
                return;
            }

            places.forEach(place => {
                const option = document.createElement('option');
                option.value = place.id;
                // 顯示格式例如：大甲區 - 大甲 (1001)
                option.textContent = `${place.town} - ${place.placeName} (${place.id})`; 
                select.appendChild(option);
            });
        }

        // ================= 2. 錄音功能 =================
        async function startRecording() {
            const placeId = document.getElementById('place-select').value;
            if (!placeId) {
                alert("請先從上方選擇一個地名！");
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    document.getElementById('audio-playback').src = audioUrl;
                    document.getElementById('audio-playback').style.display = 'block';
                    document.getElementById('upload-btn').style.display = 'block';
                };

                mediaRecorder.start();
                document.getElementById('start-btn').style.display = 'none';
                document.getElementById('stop-btn').style.display = 'block';
                document.getElementById('status').innerText = "🔴 正在錄音中...";
            } catch (err) {
                alert("無法存取麥克風，請確認權限設定。");
            }
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('start-btn').style.display = 'block';
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('status').innerText = "✅ 錄音完成，請試聽或上傳。";
            mediaRecorder.stream.getTracks().forEach(track => track.stop()); // 關閉麥克風使用權限
        }

        // ================= 3. 上傳功能 =================
        function uploadAudio() {
            if (!audioBlob) return;

            const select = document.getElementById('place-select');
            const placeId = select.value;
            const placeText = select.options[select.selectedIndex].text; // 取得選單文字
            
            const uploadBtn = document.getElementById('upload-btn');
            const statusDiv = document.getElementById('status');

            uploadBtn.innerText = "⏳ 上傳中，請稍候...";
            uploadBtn.disabled = true;
            statusDiv.innerText = "";

            const reader = new FileReader();
            reader.readAsDataURL(audioBlob);
            reader.onloadend = async function() {
                const base64data = reader.result;
                const fileName = `Record_${currentUserId}_${placeId}_${new Date().getTime()}.webm`;

                const payload = {
                    action: 'upload',          // 告訴後端這是上傳請求
                    userId: currentUserId,     // 傳送是誰錄的
                    placeId: placeId,
                    placeName: placeText,
                    filename: fileName,
                    audioBase64: base64data
                };

                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                        body: JSON.stringify(payload)
                    });

                    const result = await response.json();
                    
                    if (result.success) {
                        statusDiv.innerText = "🎉 上傳成功！您可以繼續錄製下一個地名。";
                        statusDiv.style.color = "green";
                        // 重置介面準備下一次錄音
                        document.getElementById('audio-playback').style.display = 'none';
                        uploadBtn.style.display = 'none';
                        audioBlob = null;
                        select.value = ""; // 清空選擇
                    } else {
                        throw new Error(result.error);
                    }
                } catch (error) {
                    statusDiv.innerText = "❌ 上傳失敗：" + error.message;
                    statusDiv.style.color = "red";
                } finally {
                    uploadBtn.innerText = "⬆️ 上傳至雲端資料庫";
                    uploadBtn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>
