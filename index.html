<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地名語音調查系統</title>
    <style>
        /* CSS 保持不變，略為增加上傳按鈕樣式 */
        :root { --primary: #3498db; --secondary: #2c3e50; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: var(--bg); color: #333; max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; color: var(--secondary); font-size: 24px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input[type="text"], input[type="password"], select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; font-size: 16px; border: none; border-radius: 5px; cursor: pointer; color: white; margin-bottom: 10px; transition: 0.2s; }
        .btn-primary { background-color: var(--primary); }
        .btn-record { background-color: #e74c3c; }
        .btn-stop { background-color: #95a5a6; display: none; }
        .btn-upload { background-color: #2ecc71; display: none; }
        .btn-file { background-color: #8e44ad; } /* 新增檔案上傳按鈕顏色 */
        
        .tab-container { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; background-color: #e0e0e0; color: #555; font-weight: bold; border-radius: 8px 8px 0 0; margin-bottom: 0; transition: 0.3s; }
        .tab-btn.active { background-color: var(--primary); color: white; }
        
        .filter-section { background: white; padding: 15px; border-radius: 0 0 10px 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .type-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
        .type-chip { padding: 6px 12px; border-radius: 20px; background: #eee; cursor: pointer; font-size: 14px; border: 1px solid #ccc; color: #333; }
        .type-chip.selected { background: var(--secondary); color: white; border-color: var(--secondary); }
        
        .place-list { max-height: 300px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; background: white; }
        .place-item { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .place-item:hover { background-color: #f9f9f9; }
        .place-item.active { background-color: #e8f4fd; border-left: 4px solid var(--primary); }
        .place-info { flex: 1; }
        .place-title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .place-meta { font-size: 12px; color: #777; }
        .place-meta span { background: #eee; padding: 2px 6px; border-radius: 4px; margin-right: 5px; }
        
        #recording-section { display: none; margin-top: 20px; border: 2px solid var(--primary); }
        .lang-select { display: flex; gap: 15px; margin-bottom: 15px; }
        .lang-select label { display: flex; align-items: center; gap: 5px; font-weight: bold; cursor: pointer; }
        
        .history-section { margin-top: 20px; padding-top: 15px; border-top: 2px dashed #ccc; }
        .history-item { background: #f9f9f9; border-left: 4px solid #f39c12; padding: 10px; margin-bottom: 10px; border-radius: 4px; font-size: 14px; }
        .history-meta { display: flex; justify-content: space-between; margin-bottom: 5px; color: #555; font-weight: bold; }
        
        .play-btn { background-color: #f39c12; padding: 6px 10px; font-size: 14px; border-radius: 4px; display: inline-block; width: auto; margin-bottom: 5px;}
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <h1>地名語音調查系統</h1>

    <div id="login-section" class="card">
        <input type="text" id="account" placeholder="調查員帳號">
        <input type="password" id="password" placeholder="密碼">
        <button class="btn-primary" onclick="login()" id="login-btn">登入系統</button>
        <div id="login-status" style="text-align: center; margin-top: 10px; color: red;"></div>
    </div>

    <div id="app-section" class="hidden">
        <div class="tab-container">
            <button class="tab-btn active" id="tab-assigned" onclick="switchTab('assigned')">📝 任務清單</button>
            <button class="tab-btn" id="tab-other" onclick="switchTab('other')">🌍 其他地名</button>
        </div>

        <div class="filter-section">
            <input type="text" id="search-box" placeholder="🔍 搜尋地名關鍵字..." oninput="applyFilters()">
            <div class="filter-row">
                <select id="county-filter" onchange="updateTowns(); applyFilters()">
                    <option value="">所有縣市</option>
                </select>
                <select id="town-filter" onchange="applyFilters()">
                    <option value="">所有鄉鎮</option>
                </select>
            </div>
            <div class="type-chips" id="type-container"></div>
        </div>

        <div class="place-list" id="place-list-container"></div>

        <div class="card" id="recording-section">
            <h3 id="selected-place-title" style="margin-top:0; color:var(--secondary);">未選擇地名</h3>
            
            <div class="lang-select">
                <label><input type="radio" name="lang" value="台語" checked> 台語</label>
                <label><input type="radio" name="lang" value="客語"> 客語</label>
            </div>
            
            <input type="text" id="phonetic-input" placeholder="✏️ 請輸入音標 (選填)">
            
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button class="btn-record" id="start-btn" onclick="startRecording()" style="flex: 1; margin: 0;">🎤 現場錄音</button>
                
                <input type="file" id="audio-file-input" accept="audio/*" style="display:none;" onchange="handleFileUpload(event)">
                <button class="btn-file" id="file-btn" onclick="document.getElementById('audio-file-input').click()" style="flex: 1; margin: 0;">📂 選擇本機音檔</button>
            </div>

            <button class="btn-stop" id="stop-btn" onclick="stopRecording()">⏹️ 停止錄音</button>
            <audio id="audio-playback" controls style="width:100%; margin-bottom:10px; display:none;"></audio>
            <button class="btn-upload" id="upload-btn" onclick="uploadAudio()">⬆️ 上傳並準備下一筆</button>
            
            <div id="status" style="text-align:center; font-weight:bold;"></div>

            <div class="history-section" id="history-section">
                <h4 style="margin-top:0;">此地名已上傳的紀錄：</h4>
                <div id="history-list"></div>
            </div>
        </div>
    </div>
  <script src="config.js"></script>
  <script src="main.js"></script>

</body>
</html>
